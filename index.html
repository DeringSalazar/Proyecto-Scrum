<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ITSM Service Desk</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/incidents.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="stylesheet" href="css/modal.css">

</head>

<body>

    <!-- LOGIN -->
    <div id="login-screen"></div>

    <!-- SISTEMA -->
    <div id="app" class="app-container hidden">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar"></aside>

        <!-- CONTENIDO -->
        <main class="main-layout">

            <!-- TOPBAR -->
            <header id="topbar" class="topbar"></header>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="content">

                <section id="dashboard" class="page"></section>

                <section id="incidents" class="page" style="display:none;"></section>

                <section id="kanban" class="page" style="display:none;"></section>

            </div>

        </main>

    </div>

    <!-- MODAL -->
    <div id="modal-container"></div>

    <!-- TOAST -->
    <div id="toast-container"></div>

    <!-- JAVASCRIPT -->

    <script src="js/storage.js"></script>

    <script src="js/utils.js"></script>

    <script src="js/login.js"></script>

    <script src="js/dashboard.js"></script>

    <script src="js/incidents.js"></script>

    <script src="js/kanban.js"></script>

    <script src="js/modal.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
